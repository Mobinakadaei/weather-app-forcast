<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <title>Weather App</title>
</head>

<body>
    <div class="weather-app">
        <header>
            <form class="search-form">
                <input type="search" placeholder="Enter a city..." class="search-form-input" id="search-form-input" />
                <input type="submit" value="Search" class="search-form-button" />
            </form>
        </header>
        <main>
            <div class="weather-app-data">
                <div>
                    <h1 class="weather-app-city" id="weather-app-city">Paris</h1>
                    <p class="weather-app-details">
                        <span id="time">Friday 16:32</span>, <span id="clouds">overcast clouds</span>
                        <br />
                        Humidity:
                        <strong class="humidity" id="humidity"> 37%</strong>, Wind: <strong class="wind"
                            id="wind">2.12km/h</strong>
                    </p>
                </div>
                <div class="weather-app-temperature-container">
                    <div id="weather-app-icon">
                        <img src="http://shecodes-assets.s3.amazonaws.com/api/weather/icons/rain-night.png"
                            class="weather-app-icon" />
                    </div>
                    <div class="weather-app-temperature" id="weather-app-temperature">16</div>
                    <div class="weather-app-unit">°C</div>
                </div>
            </div>
            <div class="weather-app-forecast" id="weather-app-forecast"></div>
        </main>
        <footer>This project was coded by
            <a href="https://github.com/Mobinakadaei">Mobina Kadaei</a>, is
            <a href="https://github.com/Mobinakadaei/weather-app-from-scratch">on Github</a> and
            <a href="https://glistening-sawine-862f9c.netlify.app">hosted on Netlify</a>
        </footer>
    </div>
    <script src="src/index.js"></script>
</body>

</html>
